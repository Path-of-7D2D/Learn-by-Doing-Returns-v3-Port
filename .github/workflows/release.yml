name: Release

on:
  workflow_dispatch:
    inputs:
      version_tag:
        description: "Release version tag, for example v3.0.0"
        required: true
        default: "v3.0.0"

permissions:
  contents: write

jobs:
  release:
    name: Build release zip
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Validate release inputs
        shell: bash
        run: |
          set -euo pipefail

          if [[ ! "${{ inputs.version_tag }}" =~ ^v?[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "version_tag must look like v3.0.0 or 3.0.0"
            exit 1
          fi

          if [[ ! -d "1A-LearnByDoingReturns" ]]; then
            echo "Expected 1A-LearnByDoingReturns to exist."
            exit 1
          fi

          if [[ ! -f "1A-LearnByDoingReturns/ModInfo.xml" ]]; then
            echo "Expected 1A-LearnByDoingReturns/ModInfo.xml to exist."
            exit 1
          fi

          if [[ ! -f "1A-LearnByDoingReturns/Config/progression.xml" ]]; then
            echo "Expected 1A-LearnByDoingReturns/Config/progression.xml to exist."
            exit 1
          fi

          if [[ ! -f "1A-LearnByDoingReturns/Config/buffs.xml" ]]; then
            echo "Expected 1A-LearnByDoingReturns/Config/buffs.xml to exist."
            exit 1
          fi

          if [[ ! -f "1A-LearnByDoingReturns/Config/items.xml" ]]; then
            echo "Expected 1A-LearnByDoingReturns/Config/items.xml to exist."
            exit 1
          fi

          if [[ ! -f "1A-LearnByDoingReturns/Config/loot.xml" ]]; then
            echo "Expected 1A-LearnByDoingReturns/Config/loot.xml to exist."
            exit 1
          fi

          if [[ ! -f "1A-LearnByDoingReturns/Config/traders.xml" ]]; then
            echo "Expected 1A-LearnByDoingReturns/Config/traders.xml to exist."
            exit 1
          fi

          if [[ ! -f "1A-LearnByDoingReturns/Config/Localization.csv" ]]; then
            echo "Expected 1A-LearnByDoingReturns/Config/Localization.csv to exist."
            exit 1
          fi

          if [[ ! -f "1A-LearnByDoingReturns/Config/XUi_InGame/windows.xml" ]]; then
            echo "Expected 1A-LearnByDoingReturns/Config/XUi_InGame/windows.xml to exist."
            exit 1
          fi

          if [[ ! -d "1A-LearnByDoingReturns/UIAtlases/ItemIconAtlas" ]]; then
            echo "Expected 1A-LearnByDoingReturns/UIAtlases/ItemIconAtlas to exist."
            exit 1
          fi

          icon_count="$(find "1A-LearnByDoingReturns/UIAtlases/ItemIconAtlas" -maxdepth 1 -type f \( -name '*.png' -o -name '*.webp' \) | wc -l | tr -d ' ')"
          if [[ "${icon_count}" -lt 4 ]]; then
            echo "Expected at least 4 item atlas icons, found ${icon_count}."
            exit 1
          fi

      - name: Create mod zip
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p artifacts
          zip_name="LearnByDoingReturns-${{ inputs.version_tag }}.zip"
          zip_name="${zip_name//\//-}"

          zip -r "artifacts/${zip_name}" "1A-LearnByDoingReturns"
          echo "ZIP_PATH=artifacts/${zip_name}" >> "$GITHUB_ENV"

      - name: Generate changelog
        uses: Path-of-7D2D/Changelog-Generator@main
        with:
          version_tag: ${{ inputs.version_tag }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          output_path: CHANGELOG.md

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.version_tag }}
          name: Learn By Doing Returns ${{ inputs.version_tag }}
          body_path: CHANGELOG.md
          files: ${{ env.ZIP_PATH }}
          fail_on_unmatched_files: true
